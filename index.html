<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub - Discover · Monitor · Connect</title>
  <link rel="icon" href="public/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .tab-active { background: #3b82f6; color: white; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <!-- Navbar -->
  <nav class="sticky top-0 z-50 border-b border-slate-800 bg-slate-950/90 backdrop-blur-xl">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 flex items-center justify-between h-14">
      <div class="flex items-center gap-2">
        <img src="public/logo-icon.png" alt="AI Hub" class="w-8 h-8 rounded-lg" />
        <span class="font-bold text-lg">AI Hub</span>
      </div>
      <div class="flex items-center gap-1" id="nav-tabs">
        <button onclick="switchTab('home')" class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 transition-colors" data-tab="home">AI产品导航</button>
        <button onclick="switchTab('news')" class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 transition-colors" data-tab="news">AI 资讯</button>
        <button onclick="switchTab('papers')" class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 transition-colors" data-tab="papers">论文追踪</button>
        <button onclick="switchTab('world')" class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 transition-colors" data-tab="world">国际时政</button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-500 hidden sm:block">只读预览</span>
        <a href="https://github.com/LearningByDoingNow/ai-hub" target="_blank" class="text-slate-400 hover:text-white text-sm">GitHub ↗</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="mx-auto max-w-7xl px-4 sm:px-6 py-8" id="main-content">
    <div class="text-center py-12">
      <p class="text-slate-500 text-sm uppercase tracking-wider mb-2">AI HUB</p>
      <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent mb-4">全球信息，智能聚合</h1>
      <p class="text-slate-400 mb-8">AI 自动抓取、过滤、聚合，重要的事不错过</p>
      <div id="stats" class="flex justify-center gap-8 mb-8"></div>
    </div>
    <div id="content" class="fade-in"></div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800 mt-12 py-8">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 text-center text-slate-500 text-sm">
      <p>AI Hub - 汇集全球 AI 产品导航 | <a href="https://github.com/LearningByDoingNow/ai-hub" class="text-blue-400 hover:underline">GitHub</a></p>
      <p class="mt-1 text-xs text-slate-600">此为只读静态预览，完整功能请 clone 本地运行</p>
    </div>
  </footer>

  <script>
    let DATA = { news: [], papers: [], providers: [], modules: [] };
    let currentTab = 'home';

    async function loadData() {
      const [news, papers, providers, modules] = await Promise.all([
        fetch('preview-data/news.json').then(r => r.json()),
        fetch('preview-data/papers.json').then(r => r.json()),
        fetch('preview-data/providers.json').then(r => r.json()),
        fetch('preview-data/modules.json').then(r => r.json()),
      ]);
      DATA = { news, papers, providers, modules };
      renderStats();
      switchTab('home');
    }

    function renderStats() {
      const el = document.getElementById('stats');
      const stats = [
        { label: 'AI产品导航', count: DATA.providers.length + '+', icon: '🔲' },
        { label: 'AI资讯', count: DATA.news.length + '+', icon: '📰' },
        { label: '论文追踪', count: DATA.papers.length + '+', icon: '📖' },
        { label: '国际时政', count: DATA.news.filter(n => isWorldSource(n.source)).length + '+', icon: '🌍' },
      ];
      el.innerHTML = stats.map(s => `
        <div class="text-center">
          <div class="text-2xl font-bold text-white">${s.count}</div>
          <div class="text-xs text-slate-400 mt-1">${s.icon} ${s.label}</div>
        </div>
      `).join('');
    }

    const WORLD_SOURCES = ['BBC World News','Reuters World','The Guardian World','Financial Times','New York Times World','AP News World','Al Jazeera','Sky News World','France 24','Nikkei Asia','DW News','The Economist','BBC 中文','RFI 法广中文','中国新闻网','中国日报 (国际)','联合国新闻','联合早报','Washington Post World','Foreign Policy'];

    function isWorldSource(source) {
      return WORLD_SOURCES.includes(source);
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      let d = new Date(dateStr.includes('T') ? dateStr : dateStr.replace(' ', 'T') + 'Z');
      if (isNaN(d.getTime())) return dateStr;
      const m = Math.floor((Date.now() - d.getTime()) / 60000);
      if (m < 1) return '刚刚';
      if (m < 60) return m + '分钟前';
      const h = Math.floor(m / 60);
      if (h < 24) return h + '小时前';
      const days = Math.floor(h / 24);
      return days + '天前';
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('#nav-tabs button').forEach(b => {
        b.classList.toggle('tab-active', b.dataset.tab === tab);
        b.classList.toggle('text-slate-300', b.dataset.tab !== tab);
      });
      const content = document.getElementById('content');
      content.className = 'fade-in';
      if (tab === 'home') renderProviders();
      else if (tab === 'news') renderNews(DATA.news.filter(n => !isWorldSource(n.source)));
      else if (tab === 'papers') renderPapers();
      else if (tab === 'world') renderNews(DATA.news.filter(n => isWorldSource(n.source)));
    }

    function renderProviders() {
      const categories = [...new Set(DATA.providers.map(p => p.category))];
      const content = document.getElementById('content');
      content.innerHTML = `
        <h2 class="text-xl font-bold mb-6">AI 产品导航 <span class="text-sm font-normal text-slate-500">${DATA.providers.length} 个产品</span></h2>
        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
          ${DATA.providers.map(p => {
            const links = typeof p.links === 'string' ? JSON.parse(p.links) : p.links;
            const tags = typeof p.tags === 'string' ? JSON.parse(p.tags) : p.tags;
            return `
            <div class="rounded-xl border border-slate-700 bg-slate-800/50 p-5 hover:border-slate-600 transition-colors">
              <div class="flex items-start justify-between mb-2">
                <h3 class="font-semibold text-white">${p.name}</h3>
                <span class="text-xs text-slate-500">${p.country}</span>
              </div>
              <span class="inline-block text-xs bg-blue-500/20 text-blue-300 rounded px-2 py-0.5 mb-2">${p.category}</span>
              <p class="text-sm text-slate-400 mb-3">${p.description}</p>
              <div class="flex flex-wrap gap-1 mb-3">
                ${(tags || []).slice(0, 4).map(t => `<span class="text-xs bg-slate-700 text-slate-300 rounded-full px-2 py-0.5">${t}</span>`).join('')}
              </div>
              <div class="flex flex-wrap gap-2">
                ${(links || []).slice(0, 4).map(l => `<a href="${l.url}" target="_blank" class="text-xs text-blue-400 hover:text-blue-300 border border-slate-600 rounded-lg px-2 py-1 hover:border-blue-500 transition-colors">${l.label} ↗</a>`).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>
      `;
    }

    function renderNews(items) {
      const content = document.getElementById('content');
      const title = currentTab === 'world' ? '国际时政' : 'AI 资讯';
      content.innerHTML = `
        <h2 class="text-xl font-bold mb-6">${title} <span class="text-sm font-normal text-slate-500">${items.length} 条</span></h2>
        <div class="flex flex-col gap-4">
          ${items.map(n => `
            <a href="${n.url}" target="_blank" class="block rounded-xl border border-slate-700 bg-slate-800/50 p-5 hover:border-blue-600 transition-colors group">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xs font-semibold bg-blue-500/20 text-blue-300 rounded px-2 py-0.5">${n.source}</span>
                <span class="text-xs text-slate-500">${timeAgo(n.created_at || n.date)}</span>
                <span class="text-xs text-slate-600">${(n.date || '').split('T')[0]}</span>
              </div>
              <h3 class="font-semibold text-white group-hover:text-blue-400 transition-colors mb-1 line-clamp-2">${n.title || n.title_en}</h3>
              <p class="text-sm text-slate-400 line-clamp-2">${n.summary || n.summary_en || ''}</p>
            </a>
          `).join('')}
        </div>
      `;
    }

    function renderPapers() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <h2 class="text-xl font-bold mb-6">论文追踪 <span class="text-sm font-normal text-slate-500">${DATA.papers.length} 篇</span></h2>
        <div class="flex flex-col gap-4">
          ${DATA.papers.map(p => {
            const authors = typeof p.authors === 'string' ? JSON.parse(p.authors) : p.authors;
            const links = typeof p.links === 'string' ? JSON.parse(p.links) : p.links;
            return `
            <div class="rounded-xl border border-slate-700 bg-slate-800/50 p-5">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xs font-semibold bg-purple-500/20 text-purple-300 rounded px-2 py-0.5">${p.venue || 'arXiv'}</span>
                <span class="text-xs text-slate-500">${p.date}</span>
              </div>
              <h3 class="font-semibold text-white mb-2">${p.title}</h3>
              <p class="text-xs text-slate-500 mb-2">${(authors || []).slice(0, 5).join(', ')}${(authors || []).length > 5 ? ' ...' : ''}</p>
              <p class="text-sm text-slate-400 line-clamp-3 mb-3">${p.abstract || p.abstract_en || ''}</p>
              <div class="flex gap-2">
                ${(links || []).map(l => {
                  const label = typeof l === 'string' ? 'Link' : l.label;
                  const url = typeof l === 'string' ? l : l.url;
                  return `<a href="${url}" target="_blank" class="text-xs text-purple-400 hover:text-purple-300 border border-slate-600 rounded-lg px-2 py-1 hover:border-purple-500 transition-colors">${label} ↗</a>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>
      `;
    }

    loadData();
  </script>
</body>
</html>
